    <meta charset="UTF-8">

    <style>
        :root {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --accent-color: #8b5cf6;
            --text-color: #e0e0e0;
            --input-bg: #2d2d2d;
            --success-color: #10b981;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
        }

        h1 { text-align: center; margin-bottom: 1.5rem; }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #333;
            padding-bottom: 0.5rem;
        }

        .tab {
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: #888;
        }

        .tab.active {
            color: var(--accent-color);
            background: rgba(139, 92, 246, 0.1);
        }

        .view { display: none; }
        .view.active { display: block; }

        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #888; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 0.75rem;
            background: var(--input-bg);
            border: 1px solid #333;
            border-radius: 0.5rem;
            color: white;
            box-sizing: border-box;
        }

        /* --- MODE SELECTOR STYLES --- */
        .mode-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .mode-btn {
            background: var(--input-bg);
            border: 1px solid #333;
            padding: 0.6rem;
            border-radius: 0.5rem;
            color: #888;
            cursor: pointer;
            font-size: 0.8rem;
            text-align: center;
            transition: all 0.2s;
        }

        .mode-btn.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
            background: rgba(139, 92, 246, 0.1);
        }

        button.primary {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-color);
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;

        .message.success { background: rgba(16, 185, 129, 0.1); color: var(--success-color); border: 1px solid var(--success-color); display: block; }

            background: #000;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            word-break: break-all;
            margin-top: 0.5rem;
            position: relative;
            font-size: 0.85rem;
            border: 1px solid #333;

        .blurred { filter: blur(5px); user-select: none; }

<body>
    <div class="container" id="auth-container">
        <h1>Welcome</h1>
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>
        <button class="primary" onclick="login()">Login / Register</button>
    </div>

    <div class="container" id="main-container" style="display:none;">
        <h1>Add To Vault</h1>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('inbox')">Inbox</div>
            <div class="tab" onclick="switchTab('profile')">Profile</div>
        </div>

        <div id="inbox-view" class="view active">
            <div class="input-group">
                <input type="text" id="url-input" placeholder="Paste URL...">
            </div>
            
            <label>Processing Mode</label>
            <div class="mode-selector">
                <div class="mode-btn" onclick="setMode('archivist')" id="mode-archivist">Archivist</div>
                <div class="mode-btn active" onclick="setMode('analyst')" id="mode-analyst">Analyst</div>
                <div class="mode-btn" onclick="setMode('synthesist')" id="mode-synthesist">Synthesist</div>
            </div>

            <button class="primary" id="process-btn" onclick="processLink()">Process & Save</button>
            <div id="status-message" class="message"></div>
        </div>

        <div id="profile-view" class="view">
            <p>Logged in as: <strong id="user-display"></strong></p>
            <label>Your Bearer Token (for Obsidian)</label>
            <div id="token-box" class="token-display blurred">Loading...</div>
            <button class="reveal-btn" onclick="toggleToken()">Show / Hide Token</button>
            <br><br>
            <button class="primary" style="background:#ef4444;" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        let currentMode = 'analyst';

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`mode-${mode}`).classList.add('active');
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            // Try register first
            try {
                await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
            } catch(e) {}

            const resp = await fetch('/token', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `username=${u}&password=${p}`
            });

            if (resp.ok) {
                const data = await resp.json();
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('username', u);
                showMain();
            } else {
                alert('Login failed');
            }
        }

        function showMain() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-container').style.display = 'block';
            document.getElementById('user-display').innerText = localStorage.getItem('username');
            document.getElementById('token-box').innerText = localStorage.getItem('access_token');
        }

        function toggleToken() {
            const box = document.getElementById('token-box');
            box.classList.toggle('blurred');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`${tab}-view`).classList.add('active');
        }

        async function processLink() {
            const url = document.getElementById('url-input').value;
            const btn = document.getElementById('process-btn');
            const msg = document.getElementById('status-message');
            
            if(!url) return;
            
            btn.disabled = true;
            btn.innerText = 'Processing...';
            msg.className = 'message';

            const resp = await fetch('/process-link', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                },
                body: JSON.stringify({ url: url, mode: currentMode })
            });

            const data = await resp.json();
            btn.disabled = false;
            btn.innerText = 'Process & Save';

            if (resp.ok) {
                msg.innerHTML = `Success!<br>"${data.title}" is ready in the inbox.`;
                msg.className = 'message success';
                document.getElementById('url-input').value = '';
            } else {
                alert('Error: ' + data.detail);
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        if (localStorage.getItem('access_token')) showMain();
    </script>
</body>

                <div>
                    <h3 class="text-sm font-semibold text-gray-300 mb-2">Registered Users</h3>
                    <div id="userList" class="space-y-2 max-h-40 overflow-y-auto pr-2"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_URL = '';
        let currentUser = null;

        // AUTH LOGIC
        function toggleAuth(mode) {
            document.getElementById('authMode').value = mode;
            document.getElementById('authError').classList.add('hidden');
            if(mode === 'login') {
                document.getElementById('tabLogin').classList.replace('text-gray-500', 'tab-active');
                document.getElementById('tabRegister').classList.replace('tab-active', 'text-gray-500');
                document.getElementById('authBtnText').innerText = 'Log in';
            } else {
                document.getElementById('tabRegister').classList.replace('text-gray-500', 'tab-active');
                document.getElementById('tabLogin').classList.replace('tab-active', 'text-gray-500');
                document.getElementById('authBtnText').innerText = 'Register';
            }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const mode = document.getElementById('authMode').value;
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('authError');

            try {
                if(mode === 'register') {
                    const res = await fetch('/register', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username: u, password: p, sync_strategy: 'plugin'})
                    });
                    if(!res.ok) throw new Error((await res.json()).detail || "Registration error");
                }
                
                // Login regardless
                const fd = new FormData(); fd.append('username', u); fd.append('password', p);
                const loginRes = await fetch('/token', { method: 'POST', body: fd });
                if(!loginRes.ok) throw new Error("Incorrect username or password");
                
                localStorage.setItem('obsidian_token', (await loginRes.json()).access_token);
                document.getElementById('password').value = '';
                checkAuth();
            } catch (error) {
                err.textContent = error.message;
                err.classList.remove('hidden');
            }
        });

        function logout() {
            localStorage.removeItem('obsidian_token');
            checkAuth();
        }

        async function checkAuth() {
            const token = localStorage.getItem('obsidian_token');
            if (!token) return showAuth();

            try {
                const res = await fetch('/users/me', { headers: {'Authorization': `Bearer ${token}`} });
                if (!res.ok) throw new Error("Token expired");
                currentUser = await res.json();
                showDashboard();
            } catch (e) {
                logout();
            }
        }

        function showAuth() {
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('username').value = '';
        }

        function showDashboard() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('profileName').innerText = currentUser.username;
            
            if(currentUser.is_admin) {
                document.getElementById('navAdmin').classList.remove('hidden');
                loadAdminData();
            } else {
                document.getElementById('navAdmin').classList.add('hidden');
            }
            switchView('inbox');
        }

        // TABS LOGIC
        function switchView(view) {
            ['inbox', 'profile', 'admin'].forEach(v => {
                document.getElementById(`view${v.charAt(0).toUpperCase() + v.slice(1)}`).classList.add('hidden');
                document.getElementById(`nav${v.charAt(0).toUpperCase() + v.slice(1)}`).classList.replace('tab-active', 'text-gray-500');
            });
            document.getElementById(`view${view.charAt(0).toUpperCase() + view.slice(1)}`).classList.remove('hidden');
            document.getElementById(`nav${view.charAt(0).toUpperCase() + view.slice(1)}`).classList.replace('text-gray-500', 'tab-active');
        }

        // PASSWORD LOGIC
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('obsidian_token');
            const msg = document.getElementById('pwMessage');
            try {
                const res = await fetch('/users/me/password', {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'},
                    body: JSON.stringify({old_password: document.getElementById('oldPw').value, new_password: document.getElementById('newPw').value})
                });
                const data = await res.json();
                if(res.ok) {
                    msg.innerHTML = "Password updated!"; msg.className = "text-sm mt-2 text-green-400 block";
                    document.getElementById('passwordForm').reset();
                } else throw new Error(data.detail);
            } catch (err) {
                msg.innerHTML = err.message; msg.className = "text-sm mt-2 text-red-400 block";
            }
        });

        // INBOX LOGIC
        document.getElementById('linkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('obsidian_token');
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('statusMessage');
            
            document.getElementById('btnText').classList.add('hidden');
            document.getElementById('btnSpinner').classList.remove('hidden');
            btn.disabled = true; msg.classList.add('hidden');

            try {
                const res = await fetch('/process-link', {
                    method: 'POST',
                    headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'},
                    body: JSON.stringify({ url: document.getElementById('urlInput').value })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.className = "mt-4 p-4 rounded-lg text-sm bg-green-900 text-green-200 block";
                    msg.innerHTML = `<strong>Success!</strong><br/>"${data.title}" is ready in the inbox.`;
                    document.getElementById('urlInput').value = '';
                } else throw new Error(data.detail || 'Error processing URL');
            } catch (err) {
                msg.className = "mt-4 p-4 rounded-lg text-sm bg-red-900 text-red-200 block";
                msg.textContent = err.message;
            } finally {
                document.getElementById('btnText').classList.remove('hidden');
                document.getElementById('btnSpinner').classList.add('hidden');
                btn.disabled = false;
            }
        });

        // ADMIN LOGIC
        async function loadAdminData() {
            const token = localStorage.getItem('obsidian_token');
            
            // Fetch settings
            const setRes = await fetch('/admin/settings');
            const settings = await setRes.json();
            const btn = document.getElementById('toggleSignupBtn');
            if(settings.allow_signups) {
                btn.textContent = "OPEN"; btn.className = "px-3 py-1 rounded text-sm font-bold bg-green-800 text-green-100 hover:bg-green-700";
            } else {
                btn.textContent = "CLOSED"; btn.className = "px-3 py-1 rounded text-sm font-bold bg-red-900 text-red-100 hover:bg-red-800";
            }

            // Fetch users
            const userRes = await fetch('/admin/users', {headers: {'Authorization': `Bearer ${token}`}});
            const users = await userRes.json();
            const list = document.getElementById('userList');
            list.innerHTML = users.map(u => `
                <div class="flex justify-between items-center bg-black p-3 rounded border border-gray-800">
                    <div>
                        <span class="text-white">${u.username}</span>
                        ${u.is_admin ? '<span class="ml-2 text-xs bg-purple-900 text-purple-200 px-2 py-0.5 rounded">Admin</span>' : ''}
                    </div>
                    <span class="text-xs text-gray-500">ID: ${u.id}</span>
                </div>
            `).join('');
        }

        async function toggleSignups() {
            const token = localStorage.getItem('obsidian_token');
            await fetch('/admin/toggle-signups', {method: 'POST', headers: {'Authorization': `Bearer ${token}`}});
            loadAdminData();
        }

        // INIT
        checkAuth();
    </script>
</body>
</html>
